version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "10001:10001"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@mysql:3306/medicine_db
      - NEO4J_URI=bolt://neo4j:7687/medicine
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=root
    depends_on:
      - mysql
      - neo4j
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=medicine_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  neo4j:
    image: neo4j:4.4
    environment:
      - NEO4J_AUTH=neo4j/root
      - NEO4J_dbms_memory_heap_maxSize=512M
    ports:
      - "7474:7474"  # HTTP interface
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs: